syntax = "proto3";

package mcchain.depin;

option go_package = "mcchain/x/depin/types";

// Msg defines the Msg service.
service Msg {
  rpc RegisterDevice     (MsgRegisterDevice    ) returns (MsgRegisterDeviceResponse    );
  rpc AttestDevice       (MsgAttestDevice      ) returns (MsgAttestDeviceResponse      );
  rpc SubmitContribution (MsgSubmitContribution) returns (MsgSubmitContributionResponse);
  rpc SubmitAttestation  (MsgSubmitAttestation ) returns (MsgSubmitAttestationResponse );
}
message MsgRegisterDevice {
  string creator = 1;
  string address = 2;
  string model   = 3;
  string os      = 4;
}

message MsgRegisterDeviceResponse {}

message MsgAttestDevice {
  string creator   = 1;
  string address   = 2;
  string challenge = 3;
  string signature = 4;
}

message MsgAttestDeviceResponse {}

message MsgSubmitContribution {
  string creator  = 1;
  string taskId   = 2;
  string taskType = 3;
  string score    = 4;
}

message MsgSubmitContributionResponse {}

// MsgSubmitAttestation 由预言机(Oracle)提交设备 attestation 验证结果到链上。
message MsgSubmitAttestation {
  string device_id         = 1;
  string attestation_proof = 2;
  string signature         = 3;
  string oracle_address    = 4;
}

message MsgSubmitAttestationResponse {
  bool   passed = 1;
  string reason = 2;
}

