<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="cosmjs-bundle.js"></script>
</head><body>
<script>
// WebView 里没有 Node 的 Buffer，自己实现 Uint8Array -> base64
function toBase64(bytes) {
    var bin = '';
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
}

// 生成钱包（本地 bundle，无需联网）
async function genWallet(prefix) {
    const mnemonic = cosmjs.amino.Bip39.encode(cosmjs.crypto.Random.getBytes(16));
    const wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: prefix || 'mc'});
    const accounts = await wallet.getAccounts();
    const acc = accounts[0];
    return {
        mnemonic: mnemonic,
        address: acc.address,
        pubkey: toBase64(acc.pubkey),
        algo: acc.algo
    };
}

// 从已有助记词恢复钱包（用于持久化后重新注入，避免每次启动都生成全新钱包导致丢币）
async function restoreWallet(mnemonic, prefix) {
    const wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: prefix || 'mc'});
    const accounts = await wallet.getAccounts();
    const acc = accounts[0];
    return {
        mnemonic: mnemonic,
        address: acc.address,
        pubkey: toBase64(acc.pubkey),
        algo: acc.algo
    };
}

// 注册节点
async function registerNode(mnemonic, nodeAddr, nodePort) {
    const wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    const [account] = await wallet.getAccounts();
    const client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        `http://${nodeAddr}:${nodePort}`, wallet
    );
    const msg = {
        typeUrl: '/mcchain.phonenode.MsgRegisterNode',
        value: {
            creator: account.address,
            address: account.address,
            model: 'android-miner',
            os: 'android-14',
            role: 'light-client'
        }
    };
    const fee = {amount: [], gas: '200000'};
    const result = await client.signAndBroadcast(account.address, [msg], fee, 'MC Miner v1');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 注册设备
async function registerDevice(mnemonic, nodeAddr, nodePort) {
    const wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    const [account] = await wallet.getAccounts();
    const client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        `http://${nodeAddr}:${nodePort}`, wallet
    );
    const msg = {
        typeUrl: '/mcchain.depin.MsgRegisterDevice',
        value: {
            creator: account.address,
            address: account.address,
            model: 'android-device',
            os: 'android-14'
        }
    };
    const fee = {amount: [], gas: '200000'};
    const result = await client.signAndBroadcast(account.address, [msg], fee, '');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 提交贡献（挖矿）
async function submitContribution(mnemonic, nodeAddr, nodePort, taskId, taskType, score) {
    const wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    const [account] = await wallet.getAccounts();
    const client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        `http://${nodeAddr}:${nodePort}`, wallet
    );
    const msg = {
        typeUrl: '/mcchain.depin.MsgSubmitContribution',
        value: {
            creator: account.address,
            taskId: taskId,
            taskType: taskType,
            score: String(score)
        }
    };
    const fee = {amount: [], gas: '200000'};
    const result = await client.signAndBroadcast(account.address, [msg], fee, '');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 生成6位邀请码
function generateInviteCode() {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var code = '';
    for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

// 设备认证
async function attestDevice(mnemonic, nodeAddr, nodePort) {
    var wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    var accounts = await wallet.getAccounts();
    var account = accounts[0];
    var client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        'http://' + nodeAddr + ':' + nodePort, wallet
    );
    var msg = {
        typeUrl: '/mcchain.phonenode.MsgAttestDevice',
        value: {
            creator: account.address,
            address: account.address,
            model: 'android-miner',
            os: 'android-14',
            cpu: (navigator.hardwareConcurrency || 4) + ' cores',
            ram: (navigator.deviceMemory || 4) + ' GB'
        }
    };
    var fee = {amount: [], gas: '200000'};
    var result = await client.signAndBroadcast(account.address, [msg], fee, 'MC Miner Attest');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 提交EdgeAI计算结果
async function submitEdgeAIResult(mnemonic, nodeAddr, nodePort, taskId, resultHash, attestationNonce) {
    var wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    var accounts = await wallet.getAccounts();
    var account = accounts[0];
    var client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        'http://' + nodeAddr + ':' + nodePort, wallet
    );
    var msg = {
        typeUrl: '/mcchain.edgeai.MsgSubmitResult',
        value: {
            creator: account.address,
            taskId: taskId,
            resultHash: resultHash,
            attestationNonce: String(attestationNonce)
        }
    };
    var fee = {amount: [], gas: '200000'};
    var result = await client.signAndBroadcast(account.address, [msg], fee, 'MC Miner EdgeAI');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 查询未领取奖励
async function queryRewards(nodeAddr, nodePort, address) {
    var client = await cosmjs.stargate.StargateClient.connect('http://' + nodeAddr + ':' + nodePort);
    var result = {depin: null, edgeai: null};
    try {
        var enc = new TextEncoder();
        var depinRes = await client.queryClient.queryAbci({
            path: '/mcchain.depin.Query/Rewards',
            data: enc.encode(JSON.stringify({address: address})),
            prove: false
        });
        if (depinRes && depinRes.value) {
            result.depin = JSON.parse(new TextDecoder().decode(depinRes.value));
        }
    } catch (e) {
        result.depin = {error: String(e.message || e)};
    }
    try {
        var enc2 = new TextEncoder();
        var edgeRes = await client.queryClient.queryAbci({
            path: '/mcchain.edgeai.Query/CompletedTasks',
            data: enc2.encode(JSON.stringify({address: address})),
            prove: false
        });
        if (edgeRes && edgeRes.value) {
            result.edgeai = JSON.parse(new TextDecoder().decode(edgeRes.value));
        }
    } catch (e) {
        result.edgeai = {error: String(e.message || e)};
    }
    return result;
}

// 一键领取奖励
async function claimRewards(mnemonic, nodeAddr, nodePort) {
    var wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    var accounts = await wallet.getAccounts();
    var account = accounts[0];
    var client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        'http://' + nodeAddr + ':' + nodePort, wallet
    );
    var msg = {
        typeUrl: '/mcchain.depin.MsgClaimReward',
        value: {
            creator: account.address,
            address: account.address
        }
    };
    var fee = {amount: [], gas: '200000'};
    var result = await client.signAndBroadcast(account.address, [msg], fee, 'MC Miner Claim');
    return {code: result.code, txHash: result.transactionHash, height: result.height};
}

// 生成推荐链接
async function createReferral(mnemonic, nodeAddr, nodePort, inviteeAddr) {
    var wallet = await cosmjs.amino.Secp256k1HdWallet.fromMnemonic(mnemonic, {prefix: 'mc'});
    var accounts = await wallet.getAccounts();
    var account = accounts[0];
    var client = await cosmjs.stargate.SigningStargateClient.connectWithSigner(
        'http://' + nodeAddr + ':' + nodePort, wallet
    );
    var inviteCode = generateInviteCode();
    var msg = {
        typeUrl: '/mcchain.referral.MsgCreateReferral',
        value: {
            inviter: account.address,
            invitee: inviteeAddr,
            inviteCode: inviteCode
        }
    };
    var fee = {amount: [], gas: '200000'};
    var result = await client.signAndBroadcast(account.address, [msg], fee, 'MC Miner Referral');
    return {code: result.code, txHash: result.transactionHash, height: result.height, inviteCode: inviteCode};
}

// 查询余额
async function getBalance(address, nodeAddr, nodePort) {
    const client = await cosmjs.stargate.StargateClient.connect(`http://${nodeAddr}:${nodePort}`);
    return await client.getAllBalances(address);
}

// 查询链配置
async function getChainId(nodeAddr, nodePort) {
    const client = await cosmjs.stargate.StargateClient.connect(`http://${nodeAddr}:${nodePort}`);
    return {chainId: await client.getChainId(), height: await client.getHeight()};
}

// 统一调度：Android 调用 MC.dispatch(id, name, argsJson)，完成时回传 Android.bridge(id, json)
window.MC = {
    dispatch: function (id, name, args) {
        var fns = {
            genWallet: genWallet,
            restoreWallet: restoreWallet,
            registerNode: registerNode,
            registerDevice: registerDevice,
            submitContribution: submitContribution,
            getBalance: getBalance,
            getChainId: getChainId,
            attestDevice: attestDevice,
            submitEdgeAIResult: submitEdgeAIResult,
            queryRewards: queryRewards,
            claimRewards: claimRewards,
            createReferral: createReferral
        };
        var fn = fns[name];
        if (!fn) {
            Android.bridge(id, JSON.stringify({ok: false, error: 'unknown function ' + name}));
            return;
        }
        Promise.resolve().then(function () { return fn.apply(null, args); })
            .then(function (res) {
                Android.bridge(id, JSON.stringify({ok: true, data: res === undefined ? null : res}));
            })
            .catch(function (e) {
                Android.bridge(id, JSON.stringify({ok: false, error: String(e && e.message ? e.message : e)}));
            });
    }
};
</script>

<script>
// UI 绑定函数
async function doAttestDevice() {
    var el = document.getElementById('attest-result');
    el.style.display = 'block';
    el.textContent = '正在认证...';
    try {
        var r = await attestDevice(
            document.getElementById('attest-mnemonic').value,
            document.getElementById('attest-nodeAddr').value,
            document.getElementById('attest-nodePort').value
        );
        el.textContent = JSON.stringify(r, null, 2);
    } catch(e) { el.textContent = 'Error: ' + (e.message || e); }
}
async function doSubmitEdgeAI() {
    var el = document.getElementById('edgeai-result');
    el.style.display = 'block';
    el.textContent = '正在提交...';
    try {
        var r = await submitEdgeAIResult(
            document.getElementById('edgeai-mnemonic').value,
            document.getElementById('edgeai-nodeAddr').value,
            document.getElementById('edgeai-nodePort').value,
            document.getElementById('edgeai-taskId').value,
            document.getElementById('edgeai-resultHash').value,
            document.getElementById('edgeai-nonce').value
        );
        el.textContent = JSON.stringify(r, null, 2);
    } catch(e) { el.textContent = 'Error: ' + (e.message || e); }
}

    el.textContent = '正在查询...';

        var r = await queryRewards(

            document.getElementById('reward-nodePort').value,
            document.getElementById('reward-address').value
        );
        el.textContent = JSON.stringify(r, null, 2);
    } catch(e) { el.textContent = 'Error: ' + (e.message || e); }

async function doClaimRewards() {

    el.textContent = '正在领取...';

        );

}
