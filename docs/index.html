<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mc {
            display: flex;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 900;
            font-size: clamp(8rem, 22vw, 20rem);
            color: #c9a84c;
            letter-spacing: 0.35em;
            line-height: 1;
            user-select: none;
        }

        .divider {
            width: 40%;
            height: 1px;
            background-color: #c9a84c;
            border: none;
            margin: 0.8rem 0 1.2rem 0;
        }

        .tagline {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            font-size: clamp(0.9rem, 1.6vw, 1.2rem);
            color: #c9a84c;
            font-weight: 400;
            letter-spacing: 0.15em;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mc">M &nbsp;C</div>
        <hr class="divider">
        <div class="tagline">手机即节点 · 移动即共识</div>
    </div>
</body>
</html>
